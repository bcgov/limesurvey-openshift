name: Nginx Docker CD
on:
  push:
    branches:
      - main
    paths:
      - "docker/nginx/Dockerfile"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
          - prod
jobs:
  nginx-build-push-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set up OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1.13.1
        with:
          oc: "4.16"
      - name: (Debug) List files in workspace
        run: |
          pwd
          ls -la .
          ls -la docker/nginx
      - name: Build Nginx Docker image
        run: |
          docker buildx build --file docker/nginx/Dockerfile --tag limesurvey-openshift/nginx:${{ github.event.inputs.environment || 'dev' }} --load docker/nginx
      - name: Login to OpenShift Container Registry
        env:
          OPENSHIFT_SA_USER: ${{ secrets.OPENSHIFT_SA_USER }}
          OPENSHIFT_SA_TOKEN: ${{ secrets.OPENSHIFT_SA_TOKEN }}
          OPENSHIFT_IMAGE_REGISTRY: ${{ secrets.OPENSHIFT_IMAGE_REGISTRY }}
        run: |
          echo $OPENSHIFT_SA_TOKEN | docker login $OPENSHIFT_IMAGE_REGISTRY -u $OPENSHIFT_SA_USER --password-stdin
      - name: Push Nginx image to OpenShift Registry
        env:
          OPENSHIFT_IMAGE_REGISTRY: ${{ secrets.OPENSHIFT_IMAGE_REGISTRY }}
          OPENSHIFT_REPOSITORY: ${{ secrets.OPENSHIFT_REPOSITORY }}
        run: |
          docker tag limesurvey-openshift/nginx:latest $OPENSHIFT_IMAGE_REGISTRY/$OPENSHIFT_REPOSITORY/nginx:latest
          docker push $OPENSHIFT_IMAGE_REGISTRY/$OPENSHIFT_REPOSITORY/nginx:latest
      - name: Trigger Nginx deployment rollout
        env:
          OPENSHIFT_SERVER: ${{ secrets.OPENSHIFT_SERVER }}
          OPENSHIFT_SA_TOKEN: ${{ secrets.OPENSHIFT_SA_TOKEN }}
        run: |
          oc login --server=$OPENSHIFT_SERVER --token=$OPENSHIFT_SA_TOKEN --insecure-skip-tls-verify=true
          oc rollout restart deployment/nginx
